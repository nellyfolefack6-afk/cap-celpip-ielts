<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap CELPIP & IELTS — by Nelly Folefack</title>
<meta name="description" content="Cap CELPIP & IELTS — the smart prep platform for Canada's English tests. Listening, Reading, Writing, Speaking with an AI examiner. Created by Nelly Folefack.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--marine:#0F2A44;--marine2:#16395C;--or:#C9A227;--orL:#F0E1B4;--orBg:#FBF4DF;--ivoire:#FBF8F1;--blanc:#fff;--encre:#1C2B3A;--gris:#5B6B7C;--vert:#1E7D53;--vertL:#E6F4EC;--rouge:#B3402F;--rougeL:#FBEAE6;--violet:#6C3483;--violetL:#F5EEF8;--bleu:#1B4F72;--bleuL:#EBF5FB;--celpip:#C0392B;--celpipL:#FDEDEC;--ielts:#1F6F8B;--ieltsL:#E8F4F8;--ligne:#E7E2D6;--police-titre:'Fraunces',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Public Sans',sans-serif;background:var(--ivoire);color:var(--encre);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--police-titre)}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:86px}
.topbar{background:linear-gradient(135deg,var(--marine),var(--marine2));color:#fff;padding:16px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.topbar .logo{width:40px;height:40px;border-radius:11px;border:2px solid var(--or);display:flex;align-items:center;justify-content:center;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:.7rem;flex-shrink:0}
.topbar .t1{font-family:var(--police-titre);font-weight:900;font-size:1.02rem;line-height:1.1}
.topbar .t2{font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:var(--orL)}
.contenu{padding:16px 14px 30px;animation:app .25s ease}
@keyframes app{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.carte{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(15,42,68,.04)}
.sur{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--or);font-weight:800;margin-bottom:4px}
.titre-vue{font-size:1.45rem;font-weight:900;color:var(--marine);margin-bottom:4px}
.note{font-size:.85rem;color:var(--gris);margin-bottom:14px}
.btn{display:inline-block;border:none;border-radius:12px;padding:12px 20px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:'Public Sans',sans-serif;text-decoration:none;text-align:center}
.btn-marine{background:var(--marine);color:#fff}.btn-or{background:var(--or);color:var(--marine)}
.btn-blanc{background:#fff;border:2px solid var(--marine);color:var(--marine)}
.btn-bloc{display:block;width:100%}
.gcarte{display:flex;gap:12px;align-items:center;cursor:pointer;transition:transform .12s}
.gcarte:active{transform:scale(.985)}
.gico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gtxt{flex:1}.gtit{font-size:.98rem;font-weight:800;color:var(--marine)}
.gdesc{font-size:.78rem;color:var(--gris);margin-top:1px}.gfle{color:var(--or);font-weight:900}
.barre{height:8px;background:#EDE8DB;border-radius:5px;overflow:hidden}
.barre>div{height:100%;background:linear-gradient(90deg,var(--or),#E0BE4E);border-radius:5px;transition:width .4s}
.stat{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:14px;padding:14px;text-align:center}
.stat .v{font-family:var(--police-titre);font-size:1.5rem;font-weight:900;color:var(--marine)}
.stat .l{font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:2px}
.navbas{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--ligne);display:flex;max-width:760px;margin:0 auto;z-index:60}
.navbas button{flex:1;background:none;border:none;padding:9px 2px 10px;font-size:.6rem;font-weight:800;color:#9AA7B4;cursor:pointer;font-family:'Public Sans',sans-serif}
.navbas button .i{display:block;font-size:19px;margin-bottom:2px}
.navbas button.actif{color:var(--marine)}
.pill{display:inline-block;background:var(--orBg);border:1px solid var(--or);color:#8a6d12;border-radius:20px;padding:4px 11px;font-size:.7rem;font-weight:800;margin:0 6px 6px 0}
.champ{margin-bottom:12px}
.champ label{display:block;font-size:.68rem;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.champ input,.champ select{width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:12px 13px;font-size:.95rem;outline:none;background:#fff;font-family:'Public Sans',sans-serif}
.chat-zone{background:#fff;border:1.5px solid var(--ligne);border-radius:14px;padding:12px;min-height:230px;max-height:52vh;overflow-y:auto;margin-bottom:10px}
.bulle{max-width:88%;padding:9px 12px;border-radius:13px;font-size:.86rem;line-height:1.55;margin-bottom:8px;white-space:pre-wrap}
.bulle.moi{background:var(--marine);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bulle.ia{background:#F2EFE7;color:var(--encre);border-bottom-left-radius:4px}
.portail{position:fixed;inset:0;z-index:200;background:linear-gradient(150deg,var(--marine) 0%,var(--marine2) 100%);display:flex;align-items:center;justify-content:center;padding:22px;text-align:center;overflow-y:auto}
.tabtest{display:flex;gap:8px;margin-bottom:14px}
.tabtest button{flex:1;border-radius:12px;padding:11px;font-size:.86rem;font-weight:800;cursor:pointer;border:2px solid var(--ligne);background:#fff;color:var(--gris)}
.tabtest button.on-celpip{border-color:var(--celpip);background:var(--celpipL);color:var(--celpip)}
.tabtest button.on-ielts{border-color:var(--ielts);background:var(--ieltsL);color:var(--ielts)}
textarea{width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:12px;font-size:.92rem;outline:none;font-family:'Public Sans',sans-serif;resize:vertical;min-height:150px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">C&amp;I</div>
    <div style="flex:1">
      <div class="t1">Cap CELPIP &amp; IELTS</div>
      <div class="t2">by Nelly Folefack</div>
    </div>
    <button onclick="goTab('coach')" style="background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:7px 13px;font-size:.72rem;font-weight:800;cursor:pointer">🤖 AI Examiner</button>
  </div>
  <div id="zone" class="contenu"></div>
  <div class="navbas" id="navbas"></div>
</div>

<script>
/* ═══════════ CAP CELPIP & IELTS — CORE ═══════════ */
var API_URL="/.netlify/functions/claude";
var SYNC_URL="https://script.google.com/macros/s/AKfycbxLkgoxAW5M9-Nvgwh40sDJyXGGmu1AQpjFIiYzd2tDp64Xru5ojjLjZHf9Scr03zcIKQ/exec";
var CODES=["NELLYF-CI-2026","NF-CI-001","NF-CI-002","NF-CI-003","NF-CI-004","NF-CI-005","NF-CI-006","NF-CI-007","NF-CI-008","NF-CI-009","NF-CI-010","NF-CI-011","NF-CI-012","NF-CI-013","NF-CI-014","NF-CI-015","NF-CI-016","NF-CI-017","NF-CI-018","NF-CI-019","NF-CI-020"];
var WHATSAPP="https://wa.me/17058964060?text=Hi%20Nelly%2C%20I%20would%20like%20to%20join%20Cap%20CELPIP%20%26%20IELTS!";
var EMAIL="mailto:ucbh.communaute@outlook.com?subject=Cap%20CELPIP%20%26%20IELTS%20Registration";
var LIEN_RESERVATION="https://calendar.app.google/iwir4r8N8osTrGd49";
var C={navy:"#0F2A44",gold:"#C9A227",goldL:"#FBF4DF",mid:"#5B6B7C",dark:"#1C2B3A",celpip:"#C0392B",ielts:"#1F6F8B"};

var S={code:null,screen:"password",tab:"home",test:"celpip",sub:null,
  prenom:"",nom:"",courriel:"",pays:"",target:"CLB 9",examDate:"",dateDebut:"",dateFin:"",profilOk:false,
  lessonDone:{},practiceDone:{},writingCount:0,speakingCount:0,
  coachChat:[],coachBusy:false,coachMode:null,tempsEtude:0,joursEtude:[],
  wrId:null,wrText:"",wrBusy:false,wrFeedback:null,spId:null};
var SAVE_KEYS=["prenom","nom","courriel","pays","target","examDate","dateDebut","dateFin","profilOk","lessonDone","practiceDone","writingCount","speakingCount","tempsEtude","joursEtude","test"];

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function card(i){return '<div class="carte">'+i+'</div>';}
function cle(){return "capci-"+(S.code||"anon");}
function sauver(){try{var d={};SAVE_KEYS.forEach(function(k){d[k]=S[k];});localStorage.setItem(cle(),JSON.stringify(d));}catch(e){}}
function charger(){try{var b=localStorage.getItem(cle());if(b){var d=JSON.parse(b);SAVE_KEYS.forEach(function(k){if(d[k]!==undefined)S[k]=d[k];});}}catch(e){}}
function setState(o){for(var k in o)S[k]=o[k];sauver();render();}
function suivi(ev,detail){try{fetch(SYNC_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({app:"Cap CELPIP & IELTS",code:S.code||"",prenom:S.prenom||"",nom:S.nom||"",courriel:S.courriel||"",niveau:S.target||"",event:ev,detail:detail||"",date:new Date().toISOString()})}).catch(function(){});}catch(e){}}
async function nellyAPI(body){var r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r.ok)throw new Error("API "+r.status);return await r.json();}
function getEnVoice(){var vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];return vs.filter(function(v){return v.lang==='en-CA';})[0]||vs.filter(function(v){return v.lang==='en-US';})[0]||vs.filter(function(v){return v.lang&&v.lang.indexOf('en')===0;})[0]||null;}
function speakEn(t){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);var v=getEnVoice();if(v)u.voice=v;u.lang="en-CA";u.rate=.95;window.speechSynthesis.speak(u);}catch(e){}}
setInterval(function(){if(S.screen==="app"&&!document.hidden){S.tempsEtude=(S.tempsEtude||0)+1;var d=new Date().toISOString().slice(0,10);if((S.joursEtude||[]).indexOf(d)<0)S.joursEtude=(S.joursEtude||[]).concat([d]);if(S.tempsEtude%60===0)sauver();}},60000);

/* ═══════════ NAV ═══════════ */
var TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"prepare",icon:"📚",label:"Prepare"},{id:"writing",icon:"✍️",label:"Writing"},{id:"coach",icon:"🤖",label:"Examiner"},{id:"dash",icon:"📊",label:"Progress"}];
function goTab(t){if(window.speechSynthesis)window.speechSynthesis.cancel();S.tab=t;S.sub=null;S.wrId=null;S.spId=null;sauver();render();window.scrollTo(0,0);}
function goSub(s){S.sub=s;sauver();render();window.scrollTo(0,0);}
function navBas(){return TABS.map(function(t){return '<button class="'+(S.tab===t.id?'actif':'')+'" onclick="goTab(\''+t.id+'\')"><span class="i">'+t.icon+'</span>'+t.label+'</button>';}).join("");}
function retour(l,fn){return '<button onclick="'+fn+'" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:14px">← '+l+'</button>';}
function testSwitch(){
  return '<div class="tabtest">'+
  '<button class="'+(S.test==="celpip"?"on-celpip":"")+'" onclick="S.test=\'celpip\';sauver();render()">🇨🇦 CELPIP</button>'+
  '<button class="'+(S.test==="ielts"?"on-ielts":"")+'" onclick="S.test=\'ielts\';sauver();render()">🌐 IELTS</button></div>';
}

/* ═══════════ PORTAL / BLOCKED / PROFILE ═══════════ */
function renderPortail(){
  return '<div class="portail"><div style="max-width:460px;width:100%">'+
  '<div style="width:70px;height:70px;border-radius:16px;border:3px solid var(--or);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:1rem">C&amp;I</div>'+
  '<h1 style="color:#fff;font-size:1.7rem;font-weight:900;margin-bottom:2px">Cap CELPIP &amp; IELTS</h1>'+
  '<div style="font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orL);margin-bottom:8px">by Nelly Folefack</div>'+
  '<p style="color:#B9C6D6;font-size:.88rem;margin-bottom:22px">Prove your English. Unlock Canada. 🇨🇦</p>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px;text-align:left">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:4px">🔒 Secure access</div>'+
  '<div style="font-size:.8rem;color:var(--gris);margin-bottom:14px">Enter your personal access code to start your preparation.</div>'+
  '<div style="font-size:.65rem;font-weight:800;color:#333;letter-spacing:.06em;margin-bottom:5px">MY ACCESS CODE</div>'+
  '<input id="pwd" type="text" placeholder="Ex: NF-CI-001" autocomplete="off" onkeydown="if(event.key===\'Enter\')validerCode()" style="width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:13px;font-size:1rem;text-align:center;letter-spacing:1px;outline:none">'+
  '<div id="pwdErr" style="display:none;background:var(--rougeL);color:var(--rouge);border-radius:8px;padding:8px 11px;font-size:.78rem;margin-top:8px">Code not recognized. Please check with Nelly.</div>'+
  '<button class="btn btn-marine btn-bloc" style="margin-top:12px" onclick="validerCode()">Enter →</button></div>'+
  '<p style="color:#8FA3B8;font-size:.78rem;margin:20px 0 10px">No access code yet? Join Cap CELPIP &amp; IELTS 🌍</p>'+
  '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" style="background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">💬 WhatsApp</a>'+
  '<a href="'+EMAIL+'" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">✉️ Email</a></div>'+
  '<div style="margin-top:24px;font-size:.66rem;color:rgba(255,255,255,.4)">© 2026 Nelly Folefack — All rights reserved</div>'+
  '</div></div>';
}
function validerCode(){
  var v=(document.getElementById("pwd").value||"").trim().toUpperCase();
  if(CODES.indexOf(v)<0){document.getElementById("pwdErr").style.display="block";return;}
  S.code=v;try{localStorage.setItem("capci-session",v);}catch(e){}
  charger();suivi("connexion","code validated");
  S.screen=S.profilOk?"app":"profile";
  if(statutPeriode()!=="ok")S.screen="blocked";
  render();
}
function statutPeriode(){try{var now=new Date();if(S.dateDebut&&now<new Date(S.dateDebut+"T00:00:00"))return "avant";var f=finEffective();if(f&&now>new Date(f.date+"T"+f.heure))return "apres";}catch(e){}return "ok";}
function finEffective(){if(S.examDate)return {date:S.examDate,heure:"23:00:00",src:"exam"};if(S.dateFin)return {date:S.dateFin,heure:"23:59:59",src:"manual"};return null;}
function changerCode(){try{localStorage.removeItem("capci-session");}catch(e){}S.code=null;S.screen="password";render();}
function renderBlocked(){
  var st=statutPeriode();var f=finEffective();
  return '<div class="portail"><div style="max-width:440px;width:100%">'+
  '<div style="font-size:46px;margin-bottom:12px">'+(st==="avant"?"⏳":"🏁")+'</div>'+
  '<h1 style="color:#fff;font-size:1.5rem;font-weight:900;margin-bottom:12px">Cap CELPIP &amp; IELTS</h1>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:8px">'+(st==="avant"?"Your access is coming":"Access ended")+'</div>'+
  '<div style="font-size:.86rem;color:var(--gris);line-height:1.6">'+(st==="avant"
    ?'Hi '+esc(S.prenom)+'! Your preparation starts on <strong>'+esc(S.dateDebut)+'</strong>.'
    :'Your access ended on <strong>'+esc((f||{}).date||"")+'</strong>'+((f||{}).src==="exam"?' at 11 p.m. — exam day. We wish you great success! 🍀':'')+'. Contact Nelly to extend it.')+'</div>'+
  '<div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" class="btn" style="background:#25D366;color:#fff">💬 WhatsApp</a>'+
  '<button class="btn btn-blanc" onclick="changerCode()">↩ Another code</button></div></div></div></div>';
}
function renderProfilGate(){
  return '<div style="padding:16px 14px 30px">'+
  '<div class="sur">Welcome</div><div class="titre-vue">'+(S.profilOk?'My profile':'Create your profile')+'</div>'+
  '<div class="note">This personalizes your prep and sets your access period.</div>'+
  card('<div class="sur" style="color:var(--marine)">👤 Your information</div>'+
  '<div class="champ" style="margin-top:10px"><label>First name *</label><input id="f_prenom" value="'+esc(S.prenom)+'"></div>'+
  '<div class="champ"><label>Last name *</label><input id="f_nom" value="'+esc(S.nom)+'"></div>'+
  '<div class="champ"><label>Email</label><input id="f_courriel" type="email" value="'+esc(S.courriel)+'"></div>'+
  '<div class="champ"><label>Country</label><input id="f_pays" value="'+esc(S.pays)+'" placeholder="Canada, Cameroon, France…"></div>')+
  card('<div class="sur" style="color:var(--marine)">🎯 My goal</div>'+
  '<div class="champ" style="margin-top:10px"><label>Which test?</label><select id="f_test">'+
  '<option value="celpip" '+(S.test==="celpip"?"selected":"")+'>CELPIP</option>'+
  '<option value="ielts" '+(S.test==="ielts"?"selected":"")+'>IELTS</option></select></div>'+
  '<div class="champ"><label>Target score</label><select id="f_target">'+
  ["CLB 7","CLB 8","CLB 9","CLB 10","IELTS 6.0","IELTS 6.5","IELTS 7.0","IELTS 7.5","IELTS 8.0"].map(function(t){return '<option '+(S.target===t?"selected":"")+'>'+t+'</option>';}).join("")+'</select></div>')+
  card('<div class="sur" style="color:var(--marine)">🗓️ My access period *</div>'+
  '<div style="font-size:.76rem;color:var(--gris);margin:6px 0 10px">If your exam date is set, access closes that day at 11 p.m. — you prepare right up to test day!</div>'+
  '<div class="champ"><label>Start date *</label><input id="f_debut" type="date" value="'+esc(S.dateDebut)+'"></div>'+
  '<div class="champ"><label>Exam date (if booked)</label><input id="f_exam" type="date" value="'+esc(S.examDate)+'"></div>'+
  '<div class="champ"><label>End date (if exam not booked yet)</label><input id="f_fin" type="date" value="'+esc(S.dateFin)+'"></div>')+
  '<button class="btn btn-or btn-bloc" onclick="sauverProfil()">✓ Save and start</button>'+
  (S.profilOk?'<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="S.screen=\'app\';render()">← Back</button>':'')+'</div>';
}
function sauverProfil(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():"";};
  S.prenom=g("f_prenom");S.nom=g("f_nom");S.courriel=g("f_courriel");S.pays=g("f_pays");
  S.test=g("f_test")||"celpip";S.target=g("f_target")||"CLB 9";S.dateDebut=g("f_debut");S.examDate=g("f_exam");S.dateFin=g("f_fin");
  if(!S.prenom||!S.nom||!S.dateDebut||(!S.examDate&&!S.dateFin)){alert("Please fill in: first name, last name, start date, and exam date OR end date.");return;}
  S.profilOk=true;sauver();
  var f=finEffective();
  suivi("profil_enregistre","Test "+S.test.toUpperCase()+" · target "+S.target+" · Access "+S.dateDebut+" → "+(f?f.date+(f.src==="exam"?" 11pm (exam)":""):"?")+" · "+(S.pays||""));
  S.screen=(statutPeriode()==="ok")?"app":"blocked";S.tab="home";render();
}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  var nL=Object.keys(S.lessonDone||{}).length,nP=Object.keys(S.practiceDone||{}).length;
  return '<div class="sur">Welcome'+(S.prenom?', '+esc(S.prenom):'')+'</div>'+
  '<div class="titre-vue">Prove your English. Unlock Canada.</div>'+
  '<div class="note">Your smart prep for CELPIP & IELTS — with an AI examiner. 🇨🇦</div>'+
  testSwitch()+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
  '<button class="btn btn-or" onclick="goTab(\'prepare\')">▶ Start preparing</button>'+
  '<button class="btn btn-marine" onclick="goTab(\'dash\')">📊 My progress</button>'+
  '<button class="btn btn-blanc" onclick="goTab(\'writing\')">✍️ Writing lab</button>'+
  '<button class="btn btn-blanc" onclick="goTab(\'coach\')">🤖 AI Examiner</button></div>'+

    '<div class="gtxt"><div class="gtit">'+esc(t.t)+'</div><div class="gdesc">'+esc(t.time)+'</div></div><div class="gfle">→</div></div>';
  }).join("")+
  card('<div style="font-size:.8rem;color:var(--gris)">💡 The AI examiner gives an <strong>estimated</strong> score to guide your practice. For an official-style mock with human feedback, book a <strong>live session with Nelly</strong>.</div>');
}
function renderWritingTask(){
  var tasks=WRITING_TASKS[S.test];var t=tasks.filter(function(x){return x.id===S.wrId;})[0];if(!t)return renderWriting();
  return retour("Writing Lab","S.wrId=null;S.wrFeedback=null;render()")+
  '<div style="background:'+(S.test==="celpip"?"var(--celpipL)":"var(--ieltsL)")+';border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:'+(S.test==="celpip"?"var(--celpip)":"var(--ielts)")+'">'+(S.test==="celpip"?"CELPIP":"IELTS")+' Writing</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.2rem;font-weight:900;color:var(--marine)">'+esc(t.t)+'</div>'+
  '<div style="font-size:.76rem;color:var(--gris)">'+esc(t.time)+'</div></div>'+
  card('<div class="sur">📋 Your task</div><div style="font-size:.88rem;margin-top:6px;white-space:pre-wrap;line-height:1.6">'+esc(t.prompt)+'</div>')+
  '<div class="carte"><div class="sur">✍️ Your answer</div>'+
  '<textarea id="wrArea" placeholder="Write your response here…" oninput="S.wrText=this.value" style="margin-top:8px">'+esc(S.wrText||"")+'</textarea>'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">'+
  '<span id="wc" style="font-size:.74rem;color:var(--gris)">'+wordCount(S.wrText||"")+' words</span>'+
  '<button class="btn btn-or" onclick="scoreWriting(\''+t.id+'\')" '+(S.wrBusy?'disabled style="opacity:.5"':'')+'>'+(S.wrBusy?'Scoring…':'🎯 Submit for scoring')+'</button></div></div>'+
  (S.wrFeedback?card('<div class="sur" style="color:var(--violet)">🤖 AI Examiner feedback</div><div style="font-size:.88rem;margin-top:6px;white-space:pre-wrap;line-height:1.6">'+esc(S.wrFeedback)+'</div>'+
  '<div style="font-size:.72rem;color:var(--gris);margin-top:10px;border-top:1px solid var(--ligne);padding-top:8px">⚠️ Estimated score for practice guidance only. Book a live mock with Nelly for a full evaluation.</div>'):'');
}
function wordCount(t){t=(t||"").trim();return t?t.split(/\s+/).length:0;}
async function scoreWriting(id){
  var wc=wordCount(S.wrText);
  if(wc<40){alert("Write at least 40 words before submitting (aim for the target length!).");return;}
  var tasks=WRITING_TASKS[S.test];var t=tasks.filter(function(x){return x.id===id;})[0];
  S.wrBusy=true;render();
  var sys="You are an experienced "+(S.test==="celpip"?"CELPIP":"IELTS")+" writing examiner. Score the learner's response against the official criteria. "+
    (S.test==="celpip"?"Give an estimated CLB level (1–12) for this writing.":"Give an estimated band score (0–9, in .5 steps) for this writing.")+
    " Structure your feedback EXACTLY like this:\n\n📊 ESTIMATED SCORE: [score]\n\n✅ STRENGTHS:\n- [2–3 bullet points]\n\n🔧 TO IMPROVE:\n- [2–3 concrete, specific points with a short example rewrite]\n\n💡 NEXT STEP: [one actionable tip].\n\nBe encouraging but honest. Keep it under 220 words. Answer in English.";
  var usr="TASK ("+t.t+"):\n"+t.prompt+"\n\nLEARNER'S RESPONSE ("+wc+" words):\n"+S.wrText;
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:900,system:sys,messages:[{role:"user",content:usr}]});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim()||"(no feedback)";
    S.wrFeedback=rep;S.writingCount=(S.writingCount||0)+1;sauver();
    suivi("writing_scored",t.t+" · "+wc+" words");
  }catch(e){S.wrFeedback="📵 Connection issue ("+(e.message||"error")+"). Please try again in a moment.";}
  S.wrBusy=false;render();
}

/* ═══════════ 🎤 SPEAKING LAB ═══════════ */
var SPEAKING_TASKS={
 celpip:[
  {id:"cs1",t:"Task 1 — Giving Advice",prep:"30s prep · 90s speak",prompt:"A friend has been offered a job in another city but is unsure whether to accept. Give them advice on what to consider."},
  {id:"cs2",t:"Task 2 — Personal Experience",prep:"30s prep · 60s speak",prompt:"Talk about a time you had to adapt to a new place or situation. What happened and how did you handle it?"},
  {id:"cs5",t:"Task 5 — Compare & Persuade",prep:"60s prep · 60s speak",prompt:"You're choosing between two apartments: one is cheaper but far from work; the other is closer but more expensive. Choose one and persuade your family it's the better choice."},
  {id:"cs6",t:"Task 6 — Difficult Situation",prep:"60s prep · 60s speak",prompt:"You ordered furniture that arrived damaged. Call the store, explain the problem, and decide what you want them to do."}],
 ielts:[
  {id:"is1",t:"Part 1 — Introduction",prep:"no prep · ~30s each",prompt:"Let's talk about where you live. Do you live in a house or an apartment? What do you like about your neighbourhood? Would you like to move in the future? Why?"},
  {id:"is2",t:"Part 2 — Long Turn (cue card)",prep:"1 min prep · speak 1–2 min",prompt:"Describe a skill you would like to learn. You should say: what the skill is, why you want to learn it, how you would learn it, and explain how it would help you in Canada."},
  {id:"is3",t:"Part 3 — Discussion",prep:"no prep · ~45s each",prompt:"Let's discuss learning in general. Why do some adults find it hard to learn new skills? Is it better to learn alone or with others? How has technology changed the way people learn?"}]
};
function renderSpeaking(){
  if(S.spId){var t=SPEAKING_TASKS[S.test].filter(function(x){return x.id===S.spId;})[0];if(t)return renderSpeakingTask(t);}
  var tasks=SPEAKING_TASKS[S.test];
  return retour("Prepare","goSub(null)")+
  '<div class="sur">Speaking Lab</div><div class="titre-vue">🎤 Practice speaking</div>'+
  '<div class="note">Read the task, prepare, then speak your answer out loud. Type or paste what you said and the AI examiner gives feedback.</div>'+
  testSwitch()+
  tasks.map(function(t){
    return '<div class="carte gcarte" onclick="S.spId=\''+t.id+'\';S.wrText=\'\';S.wrFeedback=null;render();window.scrollTo(0,0)">'+
    '<div class="gico" style="background:#F5EEF8">🎤</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(t.t)+'</div><div class="gdesc">'+esc(t.prep)+'</div></div><div class="gfle">→</div></div>';
  }).join("");
}
function speakPrompt(){var t=(SPEAKING_TASKS[S.test]||[]).filter(function(x){return x.id===S.spId;})[0];if(t)speakEn(String(t.prompt).replace(/\n/g,' '));}
function renderSpeakingTask(t){
  return retour("Speaking Lab","S.spId=null;S.wrFeedback=null;render()")+
  '<div style="background:#F5EEF8;border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--violet)">'+(S.test==="celpip"?"CELPIP":"IELTS")+' Speaking</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.2rem;font-weight:900;color:var(--marine)">'+esc(t.t)+'</div>'+
  '<div style="font-size:.76rem;color:var(--gris)">'+esc(t.prep)+'</div></div>'+
  card('<div class="sur">🗣️ Your task</div>'+
  '<button onclick="speakPrompt()" style="background:#F5EEF8;border:1.5px solid var(--violet);border-radius:8px;padding:6px 12px;font-size:.78rem;font-weight:800;cursor:pointer;margin:8px 0;color:var(--violet)">🔊 Hear the prompt</button>'+
  '<div style="font-size:.9rem;margin-top:4px;white-space:pre-wrap;line-height:1.6">'+esc(t.prompt)+'</div>')+
  card('<div class="sur">✍️ What did you say?</div>'+
  '<div style="font-size:.76rem;color:var(--gris);margin:4px 0 8px">Speak out loud first (use a timer!). Then type or dictate your answer here so the examiner can give feedback on structure and language.</div>'+
  '<textarea id="wrArea" placeholder="Type or dictate what you said…" oninput="S.wrText=this.value">'+esc(S.wrText||"")+'</textarea>'+
  '<button class="btn btn-or btn-bloc" style="margin-top:8px" onclick="scoreSpeaking(\''+t.id+'\')" '+(S.wrBusy?'disabled style="opacity:.5"':'')+'>'+(S.wrBusy?'Analyzing…':'🎯 Get examiner feedback')+'</button>')+
  (S.wrFeedback?card('<div class="sur" style="color:var(--violet)">🤖 AI Examiner feedback</div><div style="font-size:.88rem;margin-top:6px;white-space:pre-wrap;line-height:1.6">'+esc(S.wrFeedback)+'</div>'):'');
}
async function scoreSpeaking(id){
  var wc=wordCount(S.wrText);
  if(wc<20){alert("Type at least a couple of sentences of what you said!");return;}
  var t=SPEAKING_TASKS[S.test].filter(function(x){return x.id===id;})[0];
  S.wrBusy=true;render();
  var sys="You are an experienced "+(S.test==="celpip"?"CELPIP":"IELTS")+" speaking examiner. The learner practiced a speaking task and typed what they said. Give feedback on Fluency/Coherence, Vocabulary, Grammar, and Task response. Format:\n\n📊 ESTIMATED "+(S.test==="celpip"?"CLB":"BAND")+": [score]\n\n✅ STRENGTHS:\n- [2 points]\n\n🔧 TO IMPROVE:\n- [2–3 concrete points with a better phrasing example]\n\n💡 NEXT STEP: [one tip].\n\nEncouraging, honest, under 200 words, in English.";
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:800,system:sys,messages:[{role:"user",content:"TASK ("+t.t+"):\n"+t.prompt+"\n\nWHAT THE LEARNER SAID:\n"+S.wrText}]});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim()||"(no feedback)";
    S.wrFeedback=rep;S.speakingCount=(S.speakingCount||0)+1;sauver();suivi("speaking_practiced",t.t);
  }catch(e){S.wrFeedback="📵 Connection issue ("+(e.message||"error")+"). Please try again.";}
  S.wrBusy=false;render();
}

/* ═══════════ 🤖 AI EXAMINER (chat) ═══════════ */
var COACH_SYSTEM="You are the AI Examiner of Cap CELPIP & IELTS (created by Nelly Folefack), a Canadian English-test prep app. You help learners prepare for CELPIP and IELTS. You can: explain the test format and scoring (CELPIP = CLB 1–12; IELTS = bands 0–9), correct writing and speaking answers with an estimated score, run practice questions, role-play as an examiner (especially IELTS Speaking Parts 1–3 or CELPIP speaking tasks), and give strategy tips. Always answer in clear English. Be encouraging, specific, and concise (2–6 sentences unless more is needed). When correcting, use 🔧 wrong → correct.";
function renderCoach(){
  return '<div class="sur">AI Examiner</div><div class="titre-vue">🤖 Your examiner</div>'+
  '<div class="note">Ask about the tests, get corrections, or run a mock speaking interview — anytime.</div>'+
  '<div class="chat-zone" id="coachZone">'+
  (S.coachChat.length===0?'<div style="text-align:center;color:var(--gris);font-size:.82rem;padding:30px 10px">👋 Hi'+(S.prenom?' '+esc(S.prenom):'')+'! I\u2019m your AI Examiner.<br>Try: “Explain CELPIP scoring”<br>or “Run an IELTS Speaking Part 1 with me.”</div>':
  S.coachChat.map(function(m){return '<div class="bulle '+(m.role==="user"?"moi":"ia")+'">'+esc(m.content)+'</div>';}).join("")+(S.coachBusy?'<div class="bulle ia" style="color:var(--gris)">…</div>':''))+'</div>'+
  '<div style="display:flex;gap:8px;margin-bottom:8px">'+
  '<input id="coachInput" type="text" placeholder="Ask your examiner…" onkeydown="if(event.key===\'Enter\')coachSend()" style="flex:1;border:2px solid #DDD8CC;border-radius:12px;padding:12px 14px;font-size:.92rem;outline:none">'+
  '<button class="btn btn-marine" onclick="coachSend()" '+(S.coachBusy?'disabled style="opacity:.5"':'')+'>➤</button></div>'+
  '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
  '<button class="pill" style="cursor:pointer" onclick="coachQuick(\'Run an '+(S.test==="ielts"?"IELTS Speaking Part 1":"CELPIP speaking task")+' with me. Ask me one question at a time and give feedback.\')">🎤 Mock speaking</button>'+
  '<button class="pill" style="cursor:pointer" onclick="coachQuick(\'Explain how '+(S.test==="celpip"?"CELPIP":"IELTS")+' is scored and what '+esc(S.target)+' requires.\')">📊 Scoring</button>'+
  '<button class="pill" style="cursor:pointer" onclick="coachQuick(\'Give me one '+(S.test==="celpip"?"CELPIP":"IELTS")+' '+S.test+' writing tip for a high score.\')">💡 Writing tip</button></div>';
}
function coachQuick(t){var i=document.getElementById("coachInput");if(i)i.value=t;coachSend();}
async function coachSend(){
  var inp=document.getElementById("coachInput");if(!inp)return;var txt=inp.value.trim();if(!txt||S.coachBusy)return;
  inp.value="";S.coachChat.push({role:"user",content:txt});S.coachBusy=true;render();scrollCoach();
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:800,system:COACH_SYSTEM+" The learner is preparing for "+(S.test==="celpip"?"CELPIP":"IELTS")+", target "+S.target+".",messages:S.coachChat.slice(-16)});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim()||"(…)";
    S.coachChat.push({role:"assistant",content:rep});suivi("coach_ia","exchange");
  }catch(e){S.coachChat.push({role:"assistant",content:"📵 Connection issue ("+(e.message||"error")+"). Please try again."});}
  S.coachBusy=false;render();scrollCoach();
}
function scrollCoach(){setTimeout(function(){var z=document.getElementById("coachZone");if(z)z.scrollTop=z.scrollHeight;},60);}
</script>
