<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cap CELPIP & IELTS — by Nelly Folefack</title>
<meta name="description" content="Cap CELPIP & IELTS — the smart prep platform for Canada's English tests. Listening, Reading, Writing, Speaking with an AI examiner. Created by Nelly Folefack.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Public+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--marine:#0F2A44;--marine2:#16395C;--or:#C9A227;--orL:#F0E1B4;--orBg:#FBF4DF;--ivoire:#FBF8F1;--blanc:#fff;--encre:#1C2B3A;--gris:#5B6B7C;--vert:#1E7D53;--vertL:#E6F4EC;--rouge:#B3402F;--rougeL:#FBEAE6;--violet:#6C3483;--violetL:#F5EEF8;--bleu:#1B4F72;--bleuL:#EBF5FB;--celpip:#C0392B;--celpipL:#FDEDEC;--ielts:#1F6F8B;--ieltsL:#E8F4F8;--ligne:#E7E2D6;--police-titre:'Fraunces',serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Public Sans',sans-serif;background:var(--ivoire);color:var(--encre);line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--police-titre)}
.app{max-width:760px;margin:0 auto;min-height:100vh;padding-bottom:86px}
.topbar{background:linear-gradient(135deg,var(--marine),var(--marine2));color:#fff;padding:16px 18px;position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px}
.topbar .logo{width:40px;height:40px;border-radius:11px;border:2px solid var(--or);display:flex;align-items:center;justify-content:center;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:.7rem;flex-shrink:0}
.topbar .t1{font-family:var(--police-titre);font-weight:900;font-size:1.02rem;line-height:1.1}
.topbar .t2{font-size:.6rem;letter-spacing:.13em;text-transform:uppercase;color:var(--orL)}
.contenu{padding:16px 14px 30px;animation:app .25s ease}
@keyframes app{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.carte{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(15,42,68,.04)}
.sur{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--or);font-weight:800;margin-bottom:4px}
.titre-vue{font-size:1.45rem;font-weight:900;color:var(--marine);margin-bottom:4px}
.note{font-size:.85rem;color:var(--gris);margin-bottom:14px}
.btn{display:inline-block;border:none;border-radius:12px;padding:12px 20px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:'Public Sans',sans-serif;text-decoration:none;text-align:center}
.btn-marine{background:var(--marine);color:#fff}.btn-or{background:var(--or);color:var(--marine)}
.btn-blanc{background:#fff;border:2px solid var(--marine);color:var(--marine)}
.btn-bloc{display:block;width:100%}
.gcarte{display:flex;gap:12px;align-items:center;cursor:pointer;transition:transform .12s}
.gcarte:active{transform:scale(.985)}
.gico{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.gtxt{flex:1}.gtit{font-size:.98rem;font-weight:800;color:var(--marine)}
.gdesc{font-size:.78rem;color:var(--gris);margin-top:1px}.gfle{color:var(--or);font-weight:900}
.barre{height:8px;background:#EDE8DB;border-radius:5px;overflow:hidden}
.barre>div{height:100%;background:linear-gradient(90deg,var(--or),#E0BE4E);border-radius:5px;transition:width .4s}
.stat{background:var(--blanc);border:1.5px solid var(--ligne);border-radius:14px;padding:14px;text-align:center}
.stat .v{font-family:var(--police-titre);font-size:1.5rem;font-weight:900;color:var(--marine)}
.stat .l{font-size:.68rem;color:var(--gris);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-top:2px}
.navbas{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--ligne);display:flex;max-width:760px;margin:0 auto;z-index:60}
.navbas button{flex:1;background:none;border:none;padding:9px 2px 10px;font-size:.6rem;font-weight:800;color:#9AA7B4;cursor:pointer;font-family:'Public Sans',sans-serif}
.navbas button .i{display:block;font-size:19px;margin-bottom:2px}
.navbas button.actif{color:var(--marine)}
.pill{display:inline-block;background:var(--orBg);border:1px solid var(--or);color:#8a6d12;border-radius:20px;padding:4px 11px;font-size:.7rem;font-weight:800;margin:0 6px 6px 0}
.champ{margin-bottom:12px}
.champ label{display:block;font-size:.68rem;font-weight:800;color:#333;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.champ input,.champ select{width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:12px 13px;font-size:.95rem;outline:none;background:#fff;font-family:'Public Sans',sans-serif}
.chat-zone{background:#fff;border:1.5px solid var(--ligne);border-radius:14px;padding:12px;min-height:230px;max-height:52vh;overflow-y:auto;margin-bottom:10px}
.bulle{max-width:88%;padding:9px 12px;border-radius:13px;font-size:.86rem;line-height:1.55;margin-bottom:8px;white-space:pre-wrap}
.bulle.moi{background:var(--marine);color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.bulle.ia{background:#F2EFE7;color:var(--encre);border-bottom-left-radius:4px}
.portail{position:fixed;inset:0;z-index:200;background:linear-gradient(150deg,var(--marine) 0%,var(--marine2) 100%);display:flex;align-items:center;justify-content:center;padding:22px;text-align:center;overflow-y:auto}
.tabtest{display:flex;gap:8px;margin-bottom:14px}
.tabtest button{flex:1;border-radius:12px;padding:11px;font-size:.86rem;font-weight:800;cursor:pointer;border:2px solid var(--ligne);background:#fff;color:var(--gris)}
.tabtest button.on-celpip{border-color:var(--celpip);background:var(--celpipL);color:var(--celpip)}
.tabtest button.on-ielts{border-color:var(--ielts);background:var(--ieltsL);color:var(--ielts)}
textarea{width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:12px;font-size:.92rem;outline:none;font-family:'Public Sans',sans-serif;resize:vertical;min-height:150px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">C&amp;I</div>
    <div style="flex:1">
      <div class="t1">Cap CELPIP &amp; IELTS</div>
      <div class="t2">by Nelly Folefack</div>
    </div>
    <button onclick="goTab('coach')" style="background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.3);color:#fff;border-radius:20px;padding:7px 13px;font-size:.72rem;font-weight:800;cursor:pointer">🤖 AI Examiner</button>
  </div>
  <div id="zone" class="contenu"></div>
  <div class="navbas" id="navbas"></div>
</div>

<script>
/* ═══════════ CAP CELPIP & IELTS — CORE ═══════════ */
var API_URL="/.netlify/functions/claude";
var SYNC_URL="https://script.google.com/macros/s/AKfycbxLkgoxAW5M9-Nvgwh40sDJyXGGmu1AQpjFIiYzd2tDp64Xru5ojjLjZHf9Scr03zcIKQ/exec";
var CODES=["NELLYF-CI-2026","NF-CI-001","NF-CI-002","NF-CI-003","NF-CI-004","NF-CI-005","NF-CI-006","NF-CI-007","NF-CI-008","NF-CI-009","NF-CI-010","NF-CI-011","NF-CI-012","NF-CI-013","NF-CI-014","NF-CI-015","NF-CI-016","NF-CI-017","NF-CI-018","NF-CI-019","NF-CI-020"];
var WHATSAPP="https://wa.me/17058964060?text=Hi%20Nelly%2C%20I%20would%20like%20to%20join%20Cap%20CELPIP%20%26%20IELTS!";
var EMAIL="mailto:ucbh.communaute@outlook.com?subject=Cap%20CELPIP%20%26%20IELTS%20Registration";
var LIEN_RESERVATION="https://calendar.app.google/iwir4r8N8osTrGd49";
var C={navy:"#0F2A44",gold:"#C9A227",goldL:"#FBF4DF",mid:"#5B6B7C",dark:"#1C2B3A",celpip:"#C0392B",ielts:"#1F6F8B"};

var S={code:null,screen:"password",tab:"home",test:"celpip",sub:null,
  prenom:"",nom:"",courriel:"",pays:"",target:"CLB 9",examDate:"",dateDebut:"",dateFin:"",profilOk:false,
  lessonDone:{},practiceDone:{},writingCount:0,speakingCount:0,
  coachChat:[],coachBusy:false,coachMode:null,tempsEtude:0,joursEtude:[],
  wrId:null,wrText:"",wrBusy:false,wrFeedback:null,spId:null};
var SAVE_KEYS=["prenom","nom","courriel","pays","target","examDate","dateDebut","dateFin","profilOk","lessonDone","practiceDone","writingCount","speakingCount","tempsEtude","joursEtude","test"];

function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function card(i){return '<div class="carte">'+i+'</div>';}
function cle(){return "capci-"+(S.code||"anon");}
function sauver(){try{var d={};SAVE_KEYS.forEach(function(k){d[k]=S[k];});localStorage.setItem(cle(),JSON.stringify(d));}catch(e){}}
function charger(){try{var b=localStorage.getItem(cle());if(b){var d=JSON.parse(b);SAVE_KEYS.forEach(function(k){if(d[k]!==undefined)S[k]=d[k];});}}catch(e){}}
function setState(o){for(var k in o)S[k]=o[k];sauver();render();}
function suivi(ev,detail){try{fetch(SYNC_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify({app:"Cap CELPIP & IELTS",code:S.code||"",prenom:S.prenom||"",nom:S.nom||"",courriel:S.courriel||"",niveau:S.target||"",event:ev,detail:detail||"",date:new Date().toISOString()})}).catch(function(){});}catch(e){}}
async function nellyAPI(body){var r=await fetch(API_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});if(!r.ok)throw new Error("API "+r.status);return await r.json();}
function getEnVoice(){var vs=window.speechSynthesis?window.speechSynthesis.getVoices():[];return vs.filter(function(v){return v.lang==='en-CA';})[0]||vs.filter(function(v){return v.lang==='en-US';})[0]||vs.filter(function(v){return v.lang&&v.lang.indexOf('en')===0;})[0]||null;}
function speakEn(t){try{if(!window.speechSynthesis)return;window.speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);var v=getEnVoice();if(v)u.voice=v;u.lang="en-CA";u.rate=.95;window.speechSynthesis.speak(u);}catch(e){}}
setInterval(function(){if(S.screen==="app"&&!document.hidden){S.tempsEtude=(S.tempsEtude||0)+1;var d=new Date().toISOString().slice(0,10);if((S.joursEtude||[]).indexOf(d)<0)S.joursEtude=(S.joursEtude||[]).concat([d]);if(S.tempsEtude%60===0)sauver();}},60000);

/* ═══════════ NAV ═══════════ */
var TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"prepare",icon:"📚",label:"Prepare"},{id:"exam",icon:"📝",label:"Mock Exam"},{id:"coach",icon:"🤖",label:"Examiner"},{id:"dash",icon:"📊",label:"Progress"}];
function goTab(t){if(window.speechSynthesis)window.speechSynthesis.cancel();if(typeof stopExamTimer==="function")stopExamTimer();S.tab=t;S.sub=null;S.wrId=null;S.spId=null;S.examView=null;sauver();render();window.scrollTo(0,0);}
function goSub(s){S.sub=s;sauver();render();window.scrollTo(0,0);}
function navBas(){return TABS.map(function(t){return '<button class="'+(S.tab===t.id?'actif':'')+'" onclick="goTab(\''+t.id+'\')"><span class="i">'+t.icon+'</span>'+t.label+'</button>';}).join("");}
function retour(l,fn){return '<button onclick="'+fn+'" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:14px">← '+l+'</button>';}
function testSwitch(){
  return '<div class="tabtest">'+
  '<button class="'+(S.test==="celpip"?"on-celpip":"")+'" onclick="S.test=\'celpip\';sauver();render()">🇨🇦 CELPIP</button>'+
  '<button class="'+(S.test==="ielts"?"on-ielts":"")+'" onclick="S.test=\'ielts\';sauver();render()">🌐 IELTS</button></div>';
}

/* ═══════════ PORTAL / BLOCKED / PROFILE ═══════════ */
function renderPortail(){
  return '<div class="portail"><div style="max-width:460px;width:100%">'+
  '<div style="width:70px;height:70px;border-radius:16px;border:3px solid var(--or);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-family:var(--police-titre);font-weight:800;color:var(--or);font-size:1rem">C&amp;I</div>'+
  '<h1 style="color:#fff;font-size:1.7rem;font-weight:900;margin-bottom:2px">Cap CELPIP &amp; IELTS</h1>'+
  '<div style="font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--orL);margin-bottom:8px">by Nelly Folefack</div>'+
  '<p style="color:#B9C6D6;font-size:.88rem;margin-bottom:22px">Prove your English. Unlock Canada. 🇨🇦</p>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px;text-align:left">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:4px">🔒 Secure access</div>'+
  '<div style="font-size:.8rem;color:var(--gris);margin-bottom:14px">Enter your personal access code to start your preparation.</div>'+
  '<div style="font-size:.65rem;font-weight:800;color:#333;letter-spacing:.06em;margin-bottom:5px">MY ACCESS CODE</div>'+
  '<input id="pwd" type="text" placeholder="Ex: NF-CI-001" autocomplete="off" onkeydown="if(event.key===\'Enter\')validerCode()" style="width:100%;border:2px solid #DDD8CC;border-radius:10px;padding:13px;font-size:1rem;text-align:center;letter-spacing:1px;outline:none">'+
  '<div id="pwdErr" style="display:none;background:var(--rougeL);color:var(--rouge);border-radius:8px;padding:8px 11px;font-size:.78rem;margin-top:8px">Code not recognized. Please check with Nelly.</div>'+
  '<button class="btn btn-marine btn-bloc" style="margin-top:12px" onclick="validerCode()">Enter →</button></div>'+
  '<p style="color:#8FA3B8;font-size:.78rem;margin:20px 0 10px">No access code yet? Join Cap CELPIP &amp; IELTS 🌍</p>'+
  '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" style="background:#25D366;color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">💬 WhatsApp</a>'+
  '<a href="'+EMAIL+'" style="background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.35);color:#fff;text-decoration:none;border-radius:10px;padding:11px 17px;font-weight:800;font-size:.85rem">✉️ Email</a></div>'+
  '<div style="margin-top:24px;font-size:.66rem;color:rgba(255,255,255,.4)">© 2026 Nelly Folefack — All rights reserved</div>'+
  '</div></div>';
}
function validerCode(){
  var v=(document.getElementById("pwd").value||"").trim().toUpperCase();
  if(CODES.indexOf(v)<0){document.getElementById("pwdErr").style.display="block";return;}
  S.code=v;try{localStorage.setItem("capci-session",v);}catch(e){}
  charger();suivi("connexion","code validated");
  S.screen=S.profilOk?"app":"profile";
  if(statutPeriode()!=="ok")S.screen="blocked";
  render();
}
function statutPeriode(){try{var now=new Date();if(S.dateDebut&&now<new Date(S.dateDebut+"T00:00:00"))return "avant";var f=finEffective();if(f&&now>new Date(f.date+"T"+f.heure))return "apres";}catch(e){}return "ok";}
function finEffective(){if(S.examDate)return {date:S.examDate,heure:"23:00:00",src:"exam"};if(S.dateFin)return {date:S.dateFin,heure:"23:59:59",src:"manual"};return null;}
function changerCode(){try{localStorage.removeItem("capci-session");}catch(e){}S.code=null;S.screen="password";render();}
function renderBlocked(){
  var st=statutPeriode();var f=finEffective();
  return '<div class="portail"><div style="max-width:440px;width:100%">'+
  '<div style="font-size:46px;margin-bottom:12px">'+(st==="avant"?"⏳":"🏁")+'</div>'+
  '<h1 style="color:#fff;font-size:1.5rem;font-weight:900;margin-bottom:12px">Cap CELPIP &amp; IELTS</h1>'+
  '<div style="background:#fff;border-radius:18px;padding:24px 20px">'+
  '<div style="font-weight:900;color:var(--marine);margin-bottom:8px">'+(st==="avant"?"Your access is coming":"Access ended")+'</div>'+
  '<div style="font-size:.86rem;color:var(--gris);line-height:1.6">'+(st==="avant"
    ?'Hi '+esc(S.prenom)+'! Your preparation starts on <strong>'+esc(S.dateDebut)+'</strong>.'
    :'Your access ended on <strong>'+esc((f||{}).date||"")+'</strong>'+((f||{}).src==="exam"?' at 11 p.m. — exam day. We wish you great success! 🍀':'')+'. Contact Nelly to extend it.')+'</div>'+
  '<div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">'+
  '<a href="'+WHATSAPP+'" target="_blank" class="btn" style="background:#25D366;color:#fff">💬 WhatsApp</a>'+
  '<button class="btn btn-blanc" onclick="changerCode()">↩ Another code</button></div></div></div></div>';
}
function renderProfilGate(){
  return '<div style="padding:16px 14px 30px">'+
  '<div class="sur">Welcome</div><div class="titre-vue">'+(S.profilOk?'My profile':'Create your profile')+'</div>'+
  '<div class="note">This personalizes your prep and sets your access period.</div>'+
  card('<div class="sur" style="color:var(--marine)">👤 Your information</div>'+
  '<div class="champ" style="margin-top:10px"><label>First name *</label><input id="f_prenom" value="'+esc(S.prenom)+'"></div>'+
  '<div class="champ"><label>Last name *</label><input id="f_nom" value="'+esc(S.nom)+'"></div>'+
  '<div class="champ"><label>Email</label><input id="f_courriel" type="email" value="'+esc(S.courriel)+'"></div>'+
  '<div class="champ"><label>Country</label><input id="f_pays" value="'+esc(S.pays)+'" placeholder="Canada, Cameroon, France…"></div>')+
  card('<div class="sur" style="color:var(--marine)">🎯 My goal</div>'+
  '<div class="champ" style="margin-top:10px"><label>Which test?</label><select id="f_test">'+
  '<option value="celpip" '+(S.test==="celpip"?"selected":"")+'>CELPIP</option>'+
  '<option value="ielts" '+(S.test==="ielts"?"selected":"")+'>IELTS</option></select></div>'+
  '<div class="champ"><label>Target score</label><select id="f_target">'+
  ["CLB 7","CLB 8","CLB 9","CLB 10","IELTS 6.0","IELTS 6.5","IELTS 7.0","IELTS 7.5","IELTS 8.0"].map(function(t){return '<option '+(S.target===t?"selected":"")+'>'+t+'</option>';}).join("")+'</select></div>')+
  card('<div class="sur" style="color:var(--marine)">🗓️ My access period *</div>'+
  '<div style="font-size:.76rem;color:var(--gris);margin:6px 0 10px">If your exam date is set, access closes that day at 11 p.m. — you prepare right up to test day!</div>'+
  '<div class="champ"><label>Start date *</label><input id="f_debut" type="date" value="'+esc(S.dateDebut)+'"></div>'+
  '<div class="champ"><label>Exam date (if booked)</label><input id="f_exam" type="date" value="'+esc(S.examDate)+'"></div>'+
  '<div class="champ"><label>End date (if exam not booked yet)</label><input id="f_fin" type="date" value="'+esc(S.dateFin)+'"></div>')+
  '<button class="btn btn-or btn-bloc" onclick="sauverProfil()">✓ Save and start</button>'+
  (S.profilOk?'<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="S.screen=\'app\';render()">← Back</button>':'')+'</div>';
}
function sauverProfil(){
  var g=function(id){var e=document.getElementById(id);return e?e.value.trim():"";};
  S.prenom=g("f_prenom");S.nom=g("f_nom");S.courriel=g("f_courriel");S.pays=g("f_pays");
  S.test=g("f_test")||"celpip";S.target=g("f_target")||"CLB 9";S.dateDebut=g("f_debut");S.examDate=g("f_exam");S.dateFin=g("f_fin");
  if(!S.prenom||!S.nom||!S.dateDebut||(!S.examDate&&!S.dateFin)){alert("Please fill in: first name, last name, start date, and exam date OR end date.");return;}
  S.profilOk=true;sauver();
  var f=finEffective();
  suivi("profil_enregistre","Test "+S.test.toUpperCase()+" · target "+S.target+" · Access "+S.dateDebut+" → "+(f?f.date+(f.src==="exam"?" 11pm (exam)":""):"?")+" · "+(S.pays||""));
  S.screen=(statutPeriode()==="ok")?"app":"blocked";S.tab="home";render();
}

/* ═══════════ HOME ═══════════ */
function renderHome(){
  var nL=Object.keys(S.lessonDone||{}).length,nP=Object.keys(S.practiceDone||{}).length;
  return '<div class="sur">Welcome'+(S.prenom?', '+esc(S.prenom):'')+'</div>'+
  '<div class="titre-vue">Prove your English. Unlock Canada.</div>'+
  '<div class="note">Your smart prep for CELPIP & IELTS — with an AI examiner. 🇨🇦</div>'+
  testSwitch()+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
  '<button class="btn btn-or" onclick="goTab(\'prepare\')">▶ Start preparing</button>'+
  '<button class="btn btn-marine" onclick="goTab(\'dash\')">📊 My progress</button>'+
  '<button class="btn btn-blanc" onclick="goTab(\'exam\')">📝 Mock exam</button>'+

     {t:"Part 2 — Diagram / Information",texte:"<p><strong>Library Membership Options</strong></p><p><strong>Basic (Free):</strong> Borrow up to 5 books for 3 weeks. Access to public computers (1 hour/day).</p><p><strong>Plus ($20/year):</strong> Borrow up to 15 items including DVDs. 3-week loans with one free renewal. Computer access 3 hours/day. Free printing up to 50 pages/month.</p><p><strong>Family ($35/year):</strong> All Plus benefits for up to 4 family members. Access to the study rooms. Priority holds on new releases.</p>",
      qs:[
       {q:"Which plan allows borrowing DVDs?",o:["Plus and Family","Basic only","None","Basic and Plus"],b:0,x:"Plus includes DVDs; Family includes all Plus benefits."},
       {q:"How many books can a Basic member borrow?",o:["5","15","Unlimited","10"],b:0,x:"'Borrow up to 5 books.'"},
       {q:"Which plan gives access to study rooms?",o:["Family","Basic","Plus","All of them"],b:0,x:"Study rooms are a Family benefit."},
       {q:"How much free printing does Plus include?",o:["50 pages/month","No printing","10 pages/month","Unlimited"],b:0,x:"'Free printing up to 50 pages/month.'"}]},
     {t:"Part 3 — Information",texte:"<p>Winter driving in Canada requires preparation. Between December and March, many provinces recommend or require winter tires, which stay flexible in cold temperatures and grip snow and ice far better than all-season tires. Drivers should also keep an emergency kit in the trunk: a blanket, a flashlight, warm gloves, and a small shovel. Experts advise reducing speed, increasing the distance from the car ahead, and avoiding sudden braking on icy roads. If visibility drops during a snowstorm, it is safer to pull over and wait than to continue driving.</p>",
      qs:[
       {q:"Why are winter tires recommended?",o:["They grip snow and ice better","They are cheaper","They use less fuel","They last longer"],b:0,x:"Flexible in the cold; better grip."},
       {q:"What should be in the emergency kit?",o:["Blanket, flashlight, gloves, shovel","A television","Summer clothes","A spare engine"],b:0,x:"The four listed items."},
       {q:"What to do in very low visibility?",o:["Pull over and wait","Drive faster","Turn off the lights","Brake suddenly"],b:0,x:"'Safer to pull over and wait.'"}]},
     {t:"Part 4 — Viewpoints",texte:"<p>Should cities offer free public transit? Supporters argue it would reduce traffic, cut pollution, and help low-income residents who struggle with fares. They point to cities where ridership rose sharply after fares were removed. Critics, however, warn that 'free' transit is not truly free — the cost simply shifts to taxpayers. They argue the money might be better spent improving service reliability and frequency, which they say matters more to riders than price. Both sides agree, though, that current transit systems in many cities need significant investment.</p>",
      qs:[
       {q:"What do supporters of free transit argue?",o:["It reduces traffic and helps low-income riders","It makes cities richer","It is bad for the environment","It should cost more"],b:0,x:"Reduce traffic, cut pollution, help low-income residents."},
       {q:"What do critics argue?",o:["The cost shifts to taxpayers","Transit should be banned","Fares should double","Nobody uses transit"],b:0,x:"'Free' transit is not truly free — taxpayers pay."},
       {q:"What do BOTH sides agree on?",o:["Transit systems need significant investment","Transit should be free","Cars are better","Fares should rise"],b:0,x:"'Both sides agree… need significant investment.'"}]}]},

     {t:"Part 2 — Diagram / Information",texte:"<p><strong>Recycling Guide</strong></p><p><strong>Blue Bin:</strong> paper, cardboard, glass bottles, metal cans, hard plastics (#1–#7).</p><p><strong>Green Bin:</strong> food scraps, coffee grounds, tea bags, soiled paper towels, yard trimmings.</p><p><strong>Garbage:</strong> plastic bags, styrofoam, broken glass, diapers, chip bags.</p><p>Note: Please rinse containers before recycling. Flatten cardboard boxes. Collection is every Wednesday; bins must be at the curb by 7 a.m.</p>",

     {t:"Part 3 — Information",texte:"<p>Many newcomers to Canada are surprised by the importance of building a credit history. A credit score, ranging from 300 to 900, helps lenders decide whether to approve loans, mortgages, and even some rental applications. New arrivals often start with no score at all. Experts recommend beginning with a secured credit card, paying every bill on time, and keeping balances low. It can take six months to a year of responsible use to build a solid score. Checking your own score does not lower it, so monitoring regularly is encouraged.</p>",

     {t:"Part 4 — Viewpoints",texte:"<p>Is working from home better than working in an office? Advocates of remote work highlight saved commuting time, lower costs, and flexibility that improves work-life balance. They argue that many employees are more productive without office distractions. Opponents counter that offices foster spontaneous collaboration, mentorship, and a clearer boundary between work and home life. They worry that remote workers, especially newcomers to a company, may feel isolated. Increasingly, organizations are settling on hybrid arrangements, hoping to capture the benefits of both approaches.</p>",

  /* ---------------- IELTS LISTENING ---------------- */
  listening:[
   {label:"Listening — Test 1",title:"Listening",icon:"🎧",time:1800,scale:"Band",
    intro:"IELTS-style Listening. 4 sections, 12 questions, rising difficulty. Accents vary. Each audio can be played TWICE here (real test: once).",
    docs:[
     {t:"Section 1 — Everyday conversation",script:"Good morning, Sunrise Car Rentals, how can I help? Hi, I'd like to rent a car for the weekend. Certainly. What size were you thinking? A compact would be fine. And for how many days? Three days, Friday to Sunday. Our compact is forty-two dollars a day, so that's one hundred twenty-six dollars total, plus insurance at fifteen a day. Do you need a child seat? Yes, one please. That's an extra ten dollars for the weekend. Great, can I book it under the name Patel? P-A-T-E-L.",
      qs:[
       {q:"How many days is the rental?",o:["Three days","One day","A week","Two days"],b:0,x:"'Friday to Sunday' = three days."},
       {q:"How much is the compact per day?",o:["$42","$15","$126","$10"],b:0,x:"'Forty-two dollars a day.'"},
       {q:"What extra does the customer request?",o:["A child seat","A GPS","A second driver","A roof box"],b:0,x:"'Yes, one please' to the child seat."}]},
     {t:"Section 2 — Monologue",script:"Welcome to Riverside Park. A few things to help you enjoy your visit. The main trail is a five-kilometre loop, mostly flat, suitable for families and strollers. Washrooms are located near the main entrance and by the lake. Please keep dogs on a leash at all times, and note that swimming is not permitted in the lake this season due to water testing. The café by the entrance is open until six p.m. and offers hot drinks and light snacks. Guided bird-watching tours run every Saturday at ten a.m.",
      qs:[
       {q:"How long is the main trail?",o:["Five kilometres","Two kilometres","Ten kilometres","One kilometre"],b:0,x:"'A five-kilometre loop.'"},
       {q:"What is NOT permitted this season?",o:["Swimming in the lake","Walking dogs","Drinking coffee","Bird-watching"],b:0,x:"'Swimming is not permitted… due to water testing.'"},
       {q:"When do bird-watching tours run?",o:["Saturdays at 10 a.m.","Every day","Sundays at noon","Never"],b:0,x:"'Every Saturday at ten a.m.'"}]},
     {t:"Section 3 — Academic discussion",script:"So, for our presentation on renewable energy, how should we divide the work? I could cover solar power, since I read a lot about it. That works. Then I'll take wind energy. And we still need someone for the introduction and conclusion. I can do those if you both handle the research. Perfect. When should we meet again? How about Thursday afternoon, in the library? Let's say two o'clock. Agreed.",
      qs:[
       {q:"Which topic will the first speaker cover?",o:["Solar power","Wind energy","The conclusion","Hydro power"],b:0,x:"'I could cover solar power.'"},
       {q:"Where will they meet?",o:["In the library","At a café","Online","At home"],b:0,x:"'In the library.'"},
       {q:"What time will they meet?",o:["2 o'clock","10 o'clock","Noon","4 o'clock"],b:0,x:"'Let's say two o'clock.'"}]},
     {t:"Section 4 — Lecture",script:"Today we'll look at how cities can reduce traffic. One effective method is investing in public transit: reliable buses and trains encourage people to leave their cars at home. A second approach is building bike lanes, which are cheap and improve public health. Some cities also charge a fee to drive into the downtown core during busy hours, which reduces congestion significantly. However, these measures only work well if they are introduced together, as part of a long-term, coordinated plan.",
      qs:[
       {q:"What is the lecture mainly about?",o:["Reducing city traffic","Building houses","Growing food","Saving water"],b:0,x:"How cities can reduce traffic."},
       {q:"Why are bike lanes recommended?",o:["Cheap and improve public health","Very expensive","They increase traffic","They replace trains"],b:0,x:"'Cheap and improve public health.'"},
       {q:"When do these measures work well?",o:["When introduced together as a plan","When used alone","Only in summer","Only in villages"],b:0,x:"'Only work well if introduced together.'"}]}]},
   {label:"Listening — Test 2",title:"Listening",icon:"🎧",time:1800,scale:"Band",
    intro:"IELTS-style Listening, second version. 4 sections, 12 questions.",
    docs:[
     {t:"Section 1 — Everyday conversation",script:"Hello, City Sports Centre. Hi, I'd like to sign up for the swimming lessons. Great. Are they for you or a child? For my daughter, she's seven. Perfect, that's our junior group, Saturdays at nine thirty. The course is eight weeks and costs ninety dollars. Do I need to bring anything? Just a swimsuit, towel, and goggles. Members get ten percent off — are you a member? Not yet. No problem, you can register at the front desk. Can I book under the name Nguyen? N-G-U-Y-E-N.",
      qs:[
       {q:"Who are the lessons for?",o:["The caller's daughter","The caller","A friend","A whole family"],b:0,x:"'For my daughter, she's seven.'"},
       {q:"When is the junior group?",o:["Saturdays at 9:30","Sundays at noon","Weekdays","Any time"],b:0,x:"'Saturdays at nine thirty.'"},
       {q:"How much does the 8-week course cost?",o:["$90","$10","$80","$100"],b:0,x:"'Costs ninety dollars.'"}]},
     {t:"Section 2 — Monologue",script:"Thank you for joining today's museum tour. Before we start, a few reminders. Photography without flash is allowed in all galleries except the special exhibition on the third floor. The gift shop and café are on the ground floor. Our tour lasts about ninety minutes and ends in the main hall. If you'd like an audio guide in another language, they are available at the front desk for a small fee. Please stay with the group, as some areas are only accessible with a guide.",
      qs:[
       {q:"Where is photography NOT allowed?",o:["The special exhibition on the third floor","The ground floor","The café","Anywhere"],b:0,x:"Except the third-floor special exhibition."},
       {q:"How long is the tour?",o:["About 90 minutes","30 minutes","Three hours","All day"],b:0,x:"'Lasts about ninety minutes.'"},
       {q:"Where are audio guides available?",o:["At the front desk","In the café","Online only","In each gallery"],b:0,x:"'Available at the front desk for a small fee.'"}]},
     {t:"Section 3 — Academic discussion",script:"Have you started the research essay yet? A little. I'm struggling to narrow my topic. Me too. My tutor said we should pick something specific rather than broad. Right — 'climate change' is too big, but 'the effect of city trees on summer temperatures' could work. That's a good example. Should we use the online journals or the library books? Both, I think, but the online databases are faster for recent studies. Let's book a study room for Friday to compare notes. Sounds good.",
      qs:[
       {q:"What are the students struggling with?",o:["Narrowing their topic","Finding the library","Writing in English","The deadline"],b:0,x:"'Struggling to narrow my topic.'"},
       {q:"What did the tutor advise?",o:["Pick something specific","Pick something broad","Avoid research","Work alone"],b:0,x:"'Pick something specific rather than broad.'"},
       {q:"Why prefer online databases?",o:["Faster for recent studies","They are free","They are printed","They are required"],b:0,x:"'Faster for recent studies.'"}]},
     {t:"Section 4 — Lecture",script:"Today's lecture concerns sleep and learning. Research increasingly shows that sleep is not simply rest; it is when the brain consolidates new information. Studies find that students who sleep well after studying remember more than those who stay up late. During deep sleep, the brain replays and strengthens the day's memories. Short naps can also help, but they are no substitute for a full night's rest. The practical lesson is clear: cramming all night before an exam is far less effective than studying earlier and sleeping properly.",
      qs:[
       {q:"What is the main idea?",o:["Sleep helps the brain consolidate learning","Sleep wastes study time","Naps replace night sleep","Exams cause insomnia"],b:0,x:"Sleep consolidates new information."},
       {q:"What happens during deep sleep?",o:["The brain replays and strengthens memories","The brain stops working","Nothing useful","Muscles grow"],b:0,x:"'Replays and strengthens the day's memories.'"},
       {q:"What is the practical lesson?",o:["Study earlier and sleep properly","Cram all night","Never nap","Skip exams"],b:0,x:"Cramming is less effective than studying earlier + sleeping."}]}]}],

  reading:[
   {label:"Reading — Test 1",title:"Reading",icon:"📖",time:2400,scale:"Band",
    intro:"IELTS-style Reading. 3 passages, 13 questions, including True/False/Not Given. Base every answer ONLY on the text — 'Not Given' means the text simply doesn't say.",
    docs:[
     {t:"Passage 1 — The history of tea",texte:"<p>Tea is the most widely consumed drink in the world after water. According to legend, it was discovered in China around 2737 BCE when leaves blew into the boiling water of an emperor. For centuries, tea remained an Asian tradition. It reached Europe in the seventeenth century through Dutch and Portuguese traders, and quickly became fashionable in Britain, where it is now deeply tied to national identity. Today, tea is grown in more than forty countries, with India and China producing the largest quantities. While black tea dominates Western markets, green tea remains more popular across much of Asia.</p>",
      qs:[
       {q:"Tea is the world's most consumed drink overall.",o:["False — water is first","True","Not Given","Only in Asia"],b:0,x:"'Most consumed after water' — water is first."},
       {q:"Tea reached Europe in the 17th century.",o:["True","False","Not Given","In the 19th century"],b:0,x:"'Reached Europe in the seventeenth century.'"},
       {q:"India produces more tea than China.",o:["Not Given","True","False","Both produce none"],b:0,x:"Both are 'largest' producers; the ranking isn't stated → Not Given."},
       {q:"Green tea is more popular than black tea in Asia.",o:["True","False","Not Given","Only in India"],b:0,x:"'Green tea remains more popular across much of Asia.'"}]},
     {t:"Passage 2 — Remote work",texte:"<p>The rise of remote work has transformed how companies operate. Supporters argue that working from home increases productivity, reduces commuting stress, and allows firms to hire talent regardless of location. Employees often report a better work-life balance. However, critics point to challenges: some workers feel isolated, collaboration can suffer, and it may be harder for new employees to learn from colleagues. Many organizations have therefore adopted a 'hybrid' model, combining office and home days. Research suggests that the success of remote work depends less on the location itself and more on clear communication and trust between managers and their teams.</p>",
      qs:[
       {q:"Supporters say remote work lets firms hire from anywhere.",o:["True","False","Not Given","Only large firms"],b:0,x:"'Hire talent regardless of location.'"},
       {q:"All companies have fully abandoned offices.",o:["False","True","Not Given","Only tech firms"],b:0,x:"Many adopted a HYBRID model → false."},
       {q:"Remote work's success depends mainly on the location.",o:["False","True","Not Given","Yes, always"],b:0,x:"'Depends less on location and more on communication and trust.'"},
       {q:"Some workers feel isolated when working remotely.",o:["True","False","Not Given","Never"],b:0,x:"'Some workers feel isolated.'"}]},
     {t:"Passage 3 — Urban green spaces",texte:"<p>Parks and green spaces are increasingly recognized as essential to healthy cities. Beyond their beauty, trees and grass reduce urban temperatures, absorb rainwater that would otherwise flood streets, and filter air pollution. Studies have linked access to green space with lower stress levels and improved mental health. Yet not all residents benefit equally: wealthier neighbourhoods often have more parks than poorer ones, a gap city planners are now trying to close. Some cities have introduced 'pocket parks' — small green areas on unused land — to bring nature closer to dense neighbourhoods. Experts stress that maintaining these spaces is as important as creating them.</p>",
      qs:[
       {q:"Green spaces can help prevent street flooding.",o:["True","False","Not Given","Only in summer"],b:0,x:"They 'absorb rainwater that would otherwise flood streets.'"},
       {q:"All neighbourhoods have equal access to parks.",o:["False","True","Not Given","Yes, by law"],b:0,x:"Wealthier areas 'often have more parks than poorer ones.'"},
       {q:"Pocket parks are built on unused land.",o:["True","False","Not Given","Only downtown"],b:0,x:"'Small green areas on unused land.'"},
       {q:"Green spaces increase residents' stress.",o:["False","True","Not Given","Sometimes"],b:0,x:"Linked with LOWER stress → false."},
       {q:"Maintaining green spaces matters as much as creating them.",o:["True","False","Not Given","Only creating matters"],b:0,x:"'Maintaining… is as important as creating them.'"}]}]},
   {label:"Reading — Test 2",title:"Reading",icon:"📖",time:2400,scale:"Band",
    intro:"IELTS-style Reading, second version. 3 passages, 13 questions.",
    docs:[
     {t:"Passage 1 — The history of coffee",texte:"<p>Coffee's origins are often traced to Ethiopia, where, according to legend, a goat herder noticed his goats becoming lively after eating certain berries. By the fifteenth century, coffee was being cultivated and traded in Yemen, and coffeehouses spread across the Arab world as centres of conversation and news. Coffee reached Europe in the seventeenth century, where it initially met suspicion before becoming immensely popular. Today, coffee is one of the most traded commodities in the world, grown mainly in a band of tropical countries. Brazil is the largest producer, though the drink is consumed most heavily in northern European nations.</p>",
      qs:[
       {q:"Coffee is often traced to Ethiopia.",o:["True","False","Not Given","To Brazil"],b:0,x:"'Coffee's origins are often traced to Ethiopia.'"},
       {q:"Coffee was welcomed immediately in Europe.",o:["False","True","Not Given","Only in Italy"],b:0,x:"It 'initially met suspicion' → false."},
       {q:"Brazil is the largest coffee producer.",o:["True","False","Not Given","Tied with Yemen"],b:0,x:"'Brazil is the largest producer.'"},
       {q:"Coffeehouses were used only for drinking.",o:["False","True","Not Given","Yes"],b:0,x:"They were 'centres of conversation and news' → false."}]},
     {t:"Passage 2 — The benefits of bilingualism",texte:"<p>Speaking more than one language was once thought to confuse children, but modern research paints a very different picture. Studies suggest that bilingual individuals often show stronger 'executive function' — the mental skills used to focus attention, switch between tasks, and ignore distractions. Constantly choosing between two languages appears to give the brain regular exercise. Some research also indicates that bilingualism may delay the onset of certain age-related cognitive decline by several years. However, scientists caution that the size of these benefits varies, and that being bilingual is not a guarantee of academic success. What is clear is that a second language is an asset, not a burden.</p>",
      qs:[
       {q:"Bilingualism was once believed to confuse children.",o:["True","False","Not Given","Only in Canada"],b:0,x:"'Once thought to confuse children.'"},
       {q:"Bilingual people may have stronger executive function.",o:["True","False","Not Given","Never"],b:0,x:"'Often show stronger executive function.'"},
       {q:"Bilingualism guarantees academic success.",o:["False","True","Not Given","Yes, always"],b:0,x:"'Not a guarantee of academic success.'"},
       {q:"Bilingualism may delay some cognitive decline.",o:["True","False","Not Given","Only in children"],b:0,x:"'May delay the onset of certain age-related cognitive decline.'"}]},
     {t:"Passage 3 — Plastic and the oceans",texte:"<p>Every year, millions of tonnes of plastic waste enter the world's oceans, harming marine life and entering the food chain. Much of this plastic breaks down into tiny fragments called microplastics, which are now found from the deepest ocean trenches to Arctic ice. Efforts to address the problem take several forms: reducing single-use plastics, improving waste collection, and developing biodegradable materials. Some organizations are also working to clean up existing waste, though experts argue that prevention is far more effective than removal. Public awareness has grown, and many governments have introduced bans on items such as plastic bags and straws. Still, researchers warn that without coordinated global action, the amount of plastic in the oceans could continue to rise sharply.</p>",
      qs:[
       {q:"Microplastics have been found in Arctic ice.",o:["True","False","Not Given","Only in trenches"],b:0,x:"'From the deepest ocean trenches to Arctic ice.'"},
       {q:"Experts say removal is more effective than prevention.",o:["False","True","Not Given","They are equal"],b:0,x:"'Prevention is far more effective than removal' → false."},
       {q:"Some governments have banned plastic bags.",o:["True","False","Not Given","None have"],b:0,x:"'Bans on items such as plastic bags and straws.'"},
       {q:"Ocean plastic will definitely decrease soon.",o:["False","True","Not Given","Yes, by 2030"],b:0,x:"Without action it 'could continue to rise sharply' → false."},
       {q:"All plastic waste is successfully recycled.",o:["Not Given","True","False","Yes"],b:0,x:"The text doesn't state recycling rates → Not Given."}]}]}],

function niveauCLB(pct){if(pct>=90)return "CLB 10+";if(pct>=80)return "CLB 9";if(pct>=68)return "CLB 8";if(pct>=55)return "CLB 7";if(pct>=42)return "CLB 6";return "CLB 5 or below";}
function niveauBand(pct){if(pct>=90)return "Band 8–9";if(pct>=78)return "Band 7–7.5";if(pct>=63)return "Band 6.5";if(pct>=50)return "Band 6";if(pct>=38)return "Band 5.5";return "Band 5 or below";}
function niveauFromPct(pct){return S.test==="celpip"?niveauCLB(pct):niveauBand(pct);}

/* ---- MOCK EXAM HUB ---- */
function curExam(key){var a=MOCK[S.test][key];return Array.isArray(a)?a[S.examVer||0]:a;}

function renderExam(){
  if(S.examView==="listening")return renderExamQCM("listening");
  if(S.examView==="reading")return renderExamQCM("reading");
  if(S.examView==="writing")return renderExamWriting();
  if(S.examView==="pick")return renderExamPick();
  var m=MOCK[S.test];var isC=S.test==="celpip";
  return '<div class="sur">Mock Exam</div><div class="titre-vue">📝 Full practice test</div>'+
  '<div class="note">Real conditions: timer, official-style questions, instant '+(isC?"CLB":"band")+' estimate. Multiple versions available — do one skill at a time or all four!</div>'+
  testSwitch()+
  card('<div style="background:'+(isC?"var(--celpipL)":"var(--ieltsL)")+';border-radius:12px;padding:12px 14px">'+
  '<div style="font-weight:900;color:'+(isC?"var(--celpip)":"var(--ielts)")+';font-size:.95rem">'+(isC?"🇨🇦 CELPIP Mock Exam":"🌐 IELTS Mock Exam")+'</div>'+
  '<div style="font-size:.78rem;color:var(--gris);margin-top:2px">Scored in '+(isC?"CLB levels (1–12)":"IELTS bands (0–9)")+' · timed like the real thing.</div></div>')+
  skillCard("listening",m.listening)+
  skillCard("reading",m.reading)+
  skillCard("writing",m.writing)+
  card('<div style="font-size:.8rem;color:var(--gris)">🎤 <strong>Speaking</strong> is best practiced live — head to the <strong>Speaking Lab</strong> or book a <strong>mock exam with Nelly</strong> for a full simulation.</div>'+
  '<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="goTab(\'prepare\');goSub(\'speaking\')">🎤 Go to Speaking Lab</button>');
}
function skillCard(key,versions){
  var arr=Array.isArray(versions)?versions:[versions];
  var v0=arr[0];var nv=arr.length;
  return '<div class="carte gcarte" onclick="openExamPick(\''+key+'\')">'+
  '<div class="gico" style="background:'+(S.test==="celpip"?"var(--celpipL)":"var(--ieltsL)")+'">'+v0.icon+'</div>'+
  '<div class="gtxt"><div class="gtit">'+v0.title+'</div>'+
  '<div class="gdesc">'+nv+' version'+(nv>1?"s":"")+' · '+(v0.wr?"AI-scored writing":(v0.docs?"~"+v0.docs.reduce(function(n,d){return n+d.qs.length;},0)+" questions":""))+'</div></div>'+
  '<div class="gfle">→</div></div>';
}
function openExamPick(key){S.examPickKey=key;S.examView="pick";render();window.scrollTo(0,0);}
function renderExamPick(){
  var key=S.examPickKey;var arr=MOCK[S.test][key];if(!Array.isArray(arr))arr=[arr];
  return '<button onclick="quitExam()" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:14px">← Back to Mock Exam</button>'+
  '<div class="sur">'+(S.test==="celpip"?"CELPIP":"IELTS")+' · '+arr[0].title+'</div>'+
  '<div class="titre-vue">Choose a version</div>'+
  '<div class="note">Each version is a different exam. Try them all to practice more!</div>'+
  arr.map(function(v,vi){
    var done=S.examDoneList[S.test+"_"+key+"_"+vi];
    return '<div class="carte gcarte" onclick="startExam(\''+key+'\','+vi+')">'+
    '<div class="gico" style="background:'+(S.test==="celpip"?"var(--celpipL)":"var(--ieltsL)")+'">'+v.icon+'</div>'+
    '<div class="gtxt"><div class="gtit">'+esc(v.label||v.title)+(done?' · '+done:'')+'</div>'+
    '<div class="gdesc">'+(v.time?Math.round(v.time/60)+" min · ":"")+(v.wr?"AI-scored writing":(v.docs?v.docs.reduce(function(n,d){return n+d.qs.length;},0)+" questions":""))+'</div></div>'+
    '<div class="gfle">'+(done?'↻':'▶')+'</div></div>';
  }).join("");
}
function startExam(key,ver){S.examVer=ver||0;S.examView=key;S.examAns={};S.examStart=Date.now();S.wrText="";S.wrFeedback=null;S._examPlays={};render();window.scrollTo(0,0);
  var ex=curExam(key);if(ex&&ex.time)startExamTimer(ex.time);
}
var _examTimer=null,_examLeft=0;
function startExamTimer(sec){_examLeft=sec;clearInterval(_examTimer);_examTimer=setInterval(function(){_examLeft--;var el=document.getElementById("examClock");if(el){var m=Math.floor(_examLeft/60),s=_examLeft%60;el.textContent=(m<10?"0":"")+m+":"+(s<10?"0":"")+s;if(_examLeft<=60)el.style.color="var(--rouge)";}if(_examLeft<=0){clearInterval(_examTimer);if(S.examView==="listening"||S.examView==="reading")finishExamQCM(S.examView,true);else if(S.examView==="writing")submitExamWriting(true);}},1000);}
function stopExamTimer(){clearInterval(_examTimer);}

/* ---- QCM ENGINE (Listening / Reading) ---- */
function renderExamQCM(key){
  var m=curExam(key);var isL=key==="listening";
  var qNum=0;
  var body=m.docs.map(function(doc,di){
    var head='<div class="carte" style="border-left:4px solid '+(S.test==="celpip"?"var(--celpip)":"var(--ielts)")+'">'+
      '<div style="font-weight:800;color:var(--marine);margin-bottom:6px">'+esc(doc.t)+'</div>'+
      (isL?'<button onclick="playExamAudio('+di+')" id="pa'+di+'" style="background:var(--marine);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:.82rem;font-weight:800;cursor:pointer">🔊 Play audio ('+(2-(S._examPlays&&S._examPlays[di]||0))+' left)</button>':
        '<div style="font-size:.9rem;line-height:1.65;margin-top:4px">'+doc.texte+'</div>')+'</div>';
    var qs=doc.qs.map(function(q){
      qNum++;var qi=qNum;var key2=key+"_"+qi;var rep=S.examAns[key2];
      return '<div class="carte"><div style="font-weight:700;font-size:.92rem;margin-bottom:8px">Q'+qi+'. '+esc(q.q)+'</div>'+
      q.o.map(function(o,oi){
        var st='background:#fff;border:1.5px solid #DDD;color:var(--encre)';
        if(rep!==undefined)st=(oi===rep)?'background:#E3EBF4;border:1.5px solid var(--marine);color:var(--marine)':'background:#fff;border:1.5px solid #EEE;color:var(--gris)';
        return '<div onclick="S.examAns[\''+key2+'\']='+oi+';render()" style="'+st+';border-radius:10px;padding:9px 12px;margin-bottom:5px;font-size:.85rem;cursor:pointer">'+esc(o)+'</div>';
      }).join("")+'</div>';
    }).join("");
    return head+qs;
  }).join("");
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
  '<button onclick="quitExam()" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer">← Quit</button>'+
  '<div style="background:var(--marine);color:#fff;border-radius:20px;padding:7px 16px;font-weight:800;font-size:.95rem">⏱️ <span id="examClock">'+Math.floor(m.time/60)+':00</span></div></div>'+
  '<div style="background:'+(S.test==="celpip"?"var(--celpipL)":"var(--ieltsL)")+';border-radius:12px;padding:12px 14px;margin-bottom:12px;font-size:.82rem;color:var(--gris)"><strong style="color:'+(S.test==="celpip"?"var(--celpip)":"var(--ielts)")+'">'+(S.test==="celpip"?"CELPIP":"IELTS")+' '+m.title+'</strong><br>'+esc(m.intro)+'</div>'+
  body+
  '<button class="btn btn-or btn-bloc" style="margin-top:6px" onclick="finishExamQCM(\''+key+'\',false)">✓ Finish and see my score</button>';
}
function playExamAudio(di){
  S._examPlays=S._examPlays||{};var n=S._examPlays[di]||0;if(n>=2)return;
  var doc=curExam(S.examView).docs[di];speakEn(doc.script);S._examPlays[di]=n+1;
  var b=document.getElementById("pa"+di);if(b){var left=2-S._examPlays[di];b.textContent="🔊 Play audio ("+left+" left)";if(left<=0)b.disabled=true;}
}
function finishExamQCM(key,auto){
  stopExamTimer();if(window.speechSynthesis)window.speechSynthesis.cancel();
  var m=curExam(key);var total=0,score=0,qNum=0;
  var review=m.docs.map(function(doc){
    return '<div class="carte" style="border-left:4px solid '+(S.test==="celpip"?"var(--celpip)":"var(--ielts)")+'"><div style="font-weight:800;color:var(--marine)">'+esc(doc.t)+'</div></div>'+
    doc.qs.map(function(q){
      qNum++;total++;var rep=S.examAns[key+"_"+qNum];var ok=rep===q.b;if(ok)score++;
      return '<div class="carte"><div style="font-weight:700;font-size:.9rem;margin-bottom:6px">Q'+qNum+'. '+esc(q.q)+'</div>'+
      q.o.map(function(o,oi){
        var st='background:#fff;border:1.5px solid #EEE;color:var(--gris)';
        if(oi===q.b)st='background:var(--vertL);border:1.5px solid var(--vert);color:var(--vert)';
        else if(oi===rep)st='background:var(--rougeL);border:1.5px solid var(--rouge);color:var(--rouge)';
        return '<div style="'+st+';border-radius:10px;padding:8px 11px;margin-bottom:4px;font-size:.83rem">'+(oi===q.b?'✓ ':(oi===rep?'✗ ':''))+esc(o)+'</div>';
      }).join("")+'<div style="background:#F7F4EC;border-radius:8px;padding:7px 10px;font-size:.78rem;color:var(--gris);margin-top:4px">💡 '+esc(q.x)+'</div></div>';
    }).join("");
  }).join("");
  var pct=Math.round(score/total*100);var niv=niveauFromPct(pct);
  S.examDoneList[S.test+"_"+key+"_"+(S.examVer||0)]=niv;sauver();
  suivi("mock_"+key,S.test.toUpperCase()+" v"+((S.examVer||0)+1)+" · "+score+"/"+total+" ("+pct+"%) · "+niv+(auto?" · time up":""));
  var head='<button onclick="quitExam()" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer;margin-bottom:12px">← Back to Mock Exam</button>'+
  '<div style="background:linear-gradient(135deg,var(--marine),var(--marine2));color:#fff;border-radius:16px;padding:20px;text-align:center;margin-bottom:14px">'+
  (auto?'<div style="font-size:.78rem;color:var(--orL)">⏱️ Time is up!</div>':'')+
  '<div style="font-size:.78rem;color:#B9C6D6">Your result — '+m.title+'</div>'+
  '<div style="font-family:var(--police-titre);font-size:2rem;font-weight:900;margin:4px 0">'+score+' / '+total+'</div>'+
  '<div style="display:inline-block;background:var(--or);color:var(--marine);border-radius:20px;padding:5px 16px;font-weight:900">'+niv+'</div>'+
  '<div style="font-size:.8rem;color:#B9C6D6;margin-top:8px">'+pct+'% correct</div></div>';
  /* ---- Answer Key table (official-booklet style) ---- */
  var qN2=0;var akey='<div class="carte"><div style="font-family:var(--police-titre);font-weight:900;color:var(--marine);text-align:center;font-size:1.05rem">📋 Answer Key</div>'+
  '<div style="text-align:center;font-size:.76rem;color:var(--gris);margin:2px 0 10px">The correct answer and why — section by section.</div>';
  m.docs.forEach(function(doc){
    akey+='<div style="font-weight:800;color:var(--marine);margin:10px 0 6px;border-left:4px solid var(--or);padding-left:9px;font-size:.86rem">'+esc(doc.t)+'</div>';
    akey+='<table style="width:100%;border-collapse:collapse;font-size:.8rem">';
    akey+='<tr><th style="text-align:left;padding:5px 6px;border-bottom:2px solid var(--marine);width:52px">Q</th><th style="text-align:left;padding:5px 6px;border-bottom:2px solid var(--marine);width:62px">Answer</th><th style="text-align:left;padding:5px 6px;border-bottom:2px solid var(--marine)">Why</th></tr>';
    doc.qs.forEach(function(q){
      qN2++;var rep=S.examAns[key+"_"+qN2];var ok=rep===q.b;var lettre=String.fromCharCode(65+q.b);
      akey+='<tr style="background:'+(ok?'var(--vertL)':'var(--rougeL)')+'">'+
        '<td style="padding:6px;border-bottom:1px solid var(--ligne);font-weight:800">'+qN2+' '+(ok?'✓':'✗')+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid var(--ligne);font-weight:900;color:var(--marine)">'+lettre+'</td>'+
        '<td style="padding:6px;border-bottom:1px solid var(--ligne)">'+esc(q.x)+'</td></tr>';
    });
    akey+='</table>';
  });
  akey+='</div>';
  document.getElementById("zone").innerHTML=head+akey+review+'<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="quitExam()">← Back to Mock Exam</button>';
  window.scrollTo(0,0);
}
function quitExam(){stopExamTimer();if(window.speechSynthesis)window.speechSynthesis.cancel();S._examPlays={};S.examView=null;render();window.scrollTo(0,0);}

/* ---- WRITING EXAM (AI-scored, timed) ---- */
function renderExamWriting(){
  var m=curExam("writing");var t=m.task;
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">'+
  '<button onclick="quitExam()" style="background:#fff;border:1.5px solid var(--ligne);color:var(--gris);border-radius:10px;padding:8px 14px;font-size:.78rem;font-weight:800;cursor:pointer">← Quit</button>'+
  '<div style="background:var(--marine);color:#fff;border-radius:20px;padding:7px 16px;font-weight:800;font-size:.95rem">⏱️ <span id="examClock">'+Math.floor(t.time/60)+':00</span></div></div>'+
  '<div style="background:'+(S.test==="celpip"?"var(--celpipL)":"var(--ieltsL)")+';border-radius:14px;padding:14px 16px;margin-bottom:12px">'+
  '<div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:'+(S.test==="celpip"?"var(--celpip)":"var(--ielts)")+'">'+(S.test==="celpip"?"CELPIP":"IELTS")+' Writing — Mock</div>'+
  '<div style="font-family:var(--police-titre);font-size:1.15rem;font-weight:900;color:var(--marine)">'+esc(t.t)+'</div></div>'+
  card('<div class="sur">📋 Your task</div><div style="font-size:.88rem;margin-top:6px;white-space:pre-wrap;line-height:1.6">'+esc(t.prompt)+'</div>')+
  '<div class="carte"><textarea id="wrArea" placeholder="Write your response here…" oninput="S.wrText=this.value;document.getElementById(\'wcx\').textContent=(this.value.trim()?this.value.trim().split(/\\s+/).length:0)+\' words\'">'+esc(S.wrText||"")+'</textarea>'+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">'+
  '<span id="wcx" style="font-size:.74rem;color:var(--gris)">'+wordCount(S.wrText||"")+' words</span>'+
  '<button class="btn btn-or" onclick="submitExamWriting(false)" '+(S.wrBusy?'disabled style="opacity:.5"':'')+'>'+(S.wrBusy?'Scoring…':'🎯 Submit')+'</button></div></div>'+
  (S.wrFeedback?card('<div class="sur" style="color:var(--violet)">🤖 AI Examiner feedback</div><div style="font-size:.88rem;margin-top:6px;white-space:pre-wrap;line-height:1.6">'+esc(S.wrFeedback)+'</div>'+'<button class="btn btn-blanc btn-bloc" style="margin-top:10px" onclick="quitExam()">← Back to Mock Exam</button>'):'');
}
async function submitExamWriting(auto){
  var m=curExam("writing");var t=m.task;var wc=wordCount(S.wrText);
  if(!auto&&wc<40){alert("Write at least 40 words (aim for the full length!).");return;}
  stopExamTimer();S.wrBusy=true;render();
  var sys="You are an experienced "+(S.test==="celpip"?"CELPIP":"IELTS")+" writing examiner. Score this timed mock response against official criteria. "+
    (S.test==="celpip"?"Give an estimated CLB level (1–12).":"Give an estimated band score (0–9, .5 steps).")+
    " Format:\n\n📊 ESTIMATED "+(S.test==="celpip"?"CLB":"BAND")+": [score]\n\n✅ STRENGTHS:\n- [2–3 points]\n\n🔧 TO IMPROVE:\n- [2–3 specific points with a short rewrite example]\n\n💡 NEXT STEP: [one tip].\n\nEncouraging, honest, under 220 words, in English.";
  try{
    var data=await nellyAPI({model:"claude-sonnet-4-6",max_tokens:900,system:sys,messages:[{role:"user",content:"TASK ("+t.t+"):\n"+t.prompt+"\n\nRESPONSE ("+wc+" words"+(auto?", submitted automatically when time ended":"")+"):\n"+S.wrText}]});
    var rep=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("").trim()||"(no feedback)";
    S.wrFeedback=rep;S.writingCount=(S.writingCount||0)+1;
    var mm=(rep.match(/CLB\s*\d+|Band\s*[\d.]+/i)||[])[0]||"done";
    S.examDoneList[S.test+"_writing_"+(S.examVer||0)]=mm;sauver();
    suivi("mock_writing",S.test.toUpperCase()+" v"+((S.examVer||0)+1)+" · "+wc+" words · "+mm+(auto?" · time up":""));
  }catch(e){S.wrFeedback="📵 Connection issue ("+(e.message||"error")+"). Please try again.";}
  S.wrBusy=false;render();
}
</script>

<script>
/* Content protection: block print & save shortcuts */
document.addEventListener("keydown",function(e){
  if((e.ctrlKey||e.metaKey)&&(e.key==="p"||e.key==="P"||e.key==="s"||e.key==="S")){
    e.preventDefault();e.stopPropagation();
    alert("\u26D4 Printing and saving this content is not allowed.\nProtected content \u2014 Cap CELPIP & IELTS \u00A9 Nelly Folefack.");
    return false;
  }
},true);
window.addEventListener("beforeprint",function(){document.body.style.display="none";setTimeout(function(){document.body.style.display="";},800);});
</script>
<style>@media print{body{display:none!important}}</style>
</body>
</html>
